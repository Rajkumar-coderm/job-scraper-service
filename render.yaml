services:
  - type: web
    name: job-scraper-service
    runtime: docker
  # Use Starter ($7/mo) or higher — Playwright needs more RAM than Free (512MB)
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_NAME
        value: Job Scraper API
      - key: DEBUG
        value: "false"
      - key: HEADLESS
        value: "true"
      - key: SCRAPE_ON_STARTUP
        value: "false"
      - key: SCRAPE_SEQUENTIAL
        value: "true"
      - key: ENRICH_HR_LIMIT
        value: "5"
      - key: SCRAPER_TIMEOUT_SECONDS
        value: "120"
