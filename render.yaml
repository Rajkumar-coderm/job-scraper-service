services:
  - type: web
    name: job-scraper-service
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9